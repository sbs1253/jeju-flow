name: Daily Data Collection

on:
  schedule:
    # UTC 21:00 = KST 06:00 (매일 아침 6시)
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger data collection
        id: collect
        run: |
          response=$(curl -s -L -f -w "\n%{http_code}" -X POST "${{ secrets.APP_URL }}/api/cron/collect" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          
          echo "Status: $http_code"
          echo "Response: $body"
          
          # 내부 success 필드가 false이면 에러로 간주
          success=$(echo "$body" | jq -r '.success // false')
          if [ "$success" != "true" ]; then
            echo "::error::Internal collection failed"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          body='${{ steps.collect.outputs.body }}' # 실제로는 위 step에서 output으로 빼야함
          # 간단하게 로그 출력을 summary로 이동
          {
            echo "## ⏱️ Scheduled Data Collection Summary"
            echo ""
            echo "- Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Endpoint: ${{ secrets.APP_URL }}/api/cron/collect"
            echo "- Status: ${{ steps.collect.conclusion }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Log success
        if: success()
        run: echo "✅ Data collection completed successfully"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Data collection failed"
