name: Daily Data Collection

on:
  schedule:
    # UTC 21:00 = KST 06:00 (매일 아침 6시)
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger data collection
        id: collect
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Missing secrets APP_URL or CRON_SECRET"
            exit 1
          fi
          
          response=$(curl -s -L -w "\n%{http_code}" -X POST "${APP_URL%/}/api/cron/collect" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json")
          
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          
          echo "Status: $http_code"
          echo "Response: $body"
          
          # 내부 success 필드 체크
          success=$(echo "$body" | jq -r '.success // false')
          if [ "$success" != "true" ]; then
            echo "::error::Internal collection failed. Check Vercel logs for details."
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## ⏱️ Scheduled Data Collection Summary"
            echo ""
            echo "- Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- Endpoint: ${{ secrets.APP_URL }}/api/cron/collect"
            echo "- Job Status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Log success
        if: success()
        run: echo "✅ Data collection completed successfully"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Data collection failed"
